name = "node-wechat-gpt"
main = ".open-next/worker.js"
compatibility_date = "2026-04-09"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
keep_vars = true      # 保持环境变量，重新部署不清除
keep_bindings = true  # 保持 KV 等绑定，重新部署不清除

# 静态资源配置
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Worker 自引用（路由需要）
[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "node-wechat-gpt"

# KV 命名空间配置
# 在 Cloudflare Dashboard 中先创建 1 个 KV namespace，名称可用 wechat-gpt-history
# 然后把下面的 id 替换成实际的 namespace ID
[[kv_namespaces]]
binding = "CHAT_HISTORY"
id = "your-kv-namespace-id"
